name: Technical Risk Calibration Lab

on:
  push:
    branches:
      - "agent/combined-opportunity-engine"
    paths:
      - "scripts/build-technical-risk-dataset.ts"
      - "scripts/calibrate_technical_risk.py"
      - "package.json"
      - ".github/workflows/technical-risk-calibration-lab.yml"
  pull_request:
    branches:
      - main
    paths:
      - "scripts/build-technical-risk-dataset.ts"
      - "scripts/calibrate_technical_risk.py"
      - "package.json"
      - ".github/workflows/technical-risk-calibration-lab.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: technical-risk-calibration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  calibrate-risk:
    name: Certify selective Watch Out alerts
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      TECHNICAL_RISK_EARLIEST_DATE: "2012-01-01"
      TECHNICAL_RISK_CONCURRENCY: "4"
      TECHNICAL_RISK_EVENT_COOLDOWN: "100"
      TECHNICAL_RISK_MIN_VALIDATION_SIGNALS: "30"
      TECHNICAL_RISK_MIN_CALIBRATION_SIGNALS: "25"
      TECHNICAL_RISK_MIN_FINAL_SIGNALS: "30"
      TECHNICAL_RISK_TARGET_ERROR: "0.10"
      TECHNICAL_RISK_CERTIFICATE_CONFIDENCE: "0.90"
      TECHNICAL_RISK_EMBARGO_DAYS: "100"
      TECHNICAL_RISK_DATASET_PATH: "artifacts/technical-risk-calibration-dataset.json"
      TECHNICAL_RISK_REPORT_PATH: "artifacts/technical-risk-calibration-report.json"

    steps:
      - name: Check out isolated branch
        uses: actions/checkout@v4

      - name: Refuse main branch execution
        shell: bash
        run: |
          branch="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          test "${branch}" != "main"
          echo "Testing Watch Out calibration on ${branch}"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install application dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Build real technical-shock dataset
        run: npm run build:technical-risk-calibration-dataset

      - name: Upload technical-shock dataset
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: technical-risk-calibration-dataset
          path: artifacts/technical-risk-calibration-dataset.json
          if-no-files-found: error
          retention-days: 14

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install calibration libraries
        run: python -m pip install --disable-pip-version-check --no-input numpy pandas scipy scikit-learn

      - name: Run strict Watch Out calibration
        id: calibration
        continue-on-error: true
        run: python scripts/calibrate_technical_risk.py

      - name: Upload Watch Out calibration report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: technical-risk-calibration-report
          path: artifacts/technical-risk-calibration-report.json
          if-no-files-found: error
          retention-days: 14

      - name: Enforce 90 percent certificate
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          report = json.loads(Path("artifacts/technical-risk-calibration-report.json").read_text())
          if not report.get("passed"):
              raise SystemExit("No Watch Out definition has earned the strict 90% certificate.")
          print("Certified definitions:", report.get("summary", {}).get("certifiedDefinitions", []))
          PY
