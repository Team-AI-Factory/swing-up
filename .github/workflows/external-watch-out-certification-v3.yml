name: External Watch Out Certification V3

on:
  push:
    branches:
      - "agent/combined-opportunity-engine"
    paths:
      - "scripts/build-technical-risk-dataset.ts"
      - "scripts/certify_external_watch_out_rule_v3.py"
      - "package.json"
      - ".github/workflows/external-watch-out-certification-v3.yml"
  pull_request:
    branches:
      - main
    paths:
      - "scripts/build-technical-risk-dataset.ts"
      - "scripts/certify_external_watch_out_rule_v3.py"
      - "package.json"
      - ".github/workflows/external-watch-out-certification-v3.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: external-watch-out-certification-v3-${{ github.ref }}
  cancel-in-progress: true

jobs:
  certify:
    name: Test parabolic-extension Watch Out rule on third unseen universe
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 65
    env:
      TECHNICAL_RISK_EARLIEST_DATE: "2012-01-01"
      TECHNICAL_RISK_CONCURRENCY: "4"
      TECHNICAL_RISK_EVENT_COOLDOWN: "100"
      TECHNICAL_RISK_TICKERS: "ADMA,APLS,ARDX,BBIO,BPMC,CORT,CYTK,DYN,EWTX,FATE,FGEN,HALO,IMCR,INSM,KRYS,MDGL,NBIX,PTCT,RARE,RCKT,SMMT,TGTX,TMDX,TVTX,XENE,ZLAB,BROS,BRCC,CPNG,DLO,EAT,FRPT,GLOB,GOOS,LEVI,ONON,PRCH,RVLV,SHAK,SKX,TPR,VFC,WING,AUR,BLDE,BWXT,CARR,CEG,CNH,CW,DOV,FLR,GEV,GNRC,GTES,IEX,ITT,JCI,JELD,MOD,MTZ,NVT,OSK,PWR,RR,SAIA,TDG,TKR,URI,WAB,AR,CHRD,CNX,CRC,GPOR,LBRT,NOV,NOG,SM,VTLE,WFRD,CDE,HL,IAG,KGC,NGD,PAAS,SBSW,SSRM,AG,FSM,UUUU,BRO,COF,EWBC,FITB,HBAN,KEY,MTB,RF,SYF,TRU,WBS,ZION,VNO,SLG,BXP,CPT,EQR,ESS,INVH,MAA,UDR,CHTR,LBRDK,LYV,MTCH,NWSA,OMC,RCI,SIRI,SPOT,T,VZ,AMKR,ASX,CAMT,DIOD,FORM,GFS,HIMX,INDI,IPGP,MCHP,NOVT,PI,RMBS,SYNA,UMC,GRAB,STNE,PAGS,XP,VNET,TME,WB,BEKE,HTHT,TCOM,QFIN"
      TECHNICAL_RISK_DATASET_PATH: "artifacts/external-watch-out-v3-dataset.json"
      EXTERNAL_WATCH_OUT_V3_DATASET_PATH: "artifacts/external-watch-out-v3-dataset.json"
      EXTERNAL_WATCH_OUT_V3_REPORT_PATH: "artifacts/external-watch-out-v3-certificate.json"
      EXTERNAL_WATCH_OUT_V3_MIN_SIGNALS: "30"
      EXTERNAL_WATCH_OUT_V3_MIN_UNIQUE_TICKERS: "20"
      EXTERNAL_WATCH_OUT_V3_TARGET_ERROR: "0.10"
      EXTERNAL_WATCH_OUT_V3_CERTIFICATE_CONFIDENCE: "0.90"

    steps:
      - name: Check out isolated branch
        uses: actions/checkout@v4

      - name: Refuse main branch execution
        shell: bash
        run: |
          branch="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          test "${branch}" != "main"
          echo "Testing frozen parabolic-extension rule on ${branch}"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install application dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Build third unseen-stock dataset
        run: npm run build:technical-risk-calibration-dataset

      - name: Upload burned third holdout dataset
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: external-watch-out-v3-dataset
          path: artifacts/external-watch-out-v3-dataset.json
          if-no-files-found: error
          retention-days: 30

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install certification libraries
        run: python -m pip install --disable-pip-version-check --no-input pandas scipy

      - name: Apply frozen V3 rule once
        id: certificate
        continue-on-error: true
        run: python scripts/certify_external_watch_out_rule_v3.py

      - name: Upload third external certificate
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: external-watch-out-v3-certificate
          path: artifacts/external-watch-out-v3-certificate.json
          if-no-files-found: error
          retention-days: 30

      - name: Enforce third external certificate
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          report = json.loads(Path("artifacts/external-watch-out-v3-certificate.json").read_text())
          if not report.get("passed"):
              raise SystemExit("The parabolic-extension Watch Out rule did not pass the third unseen-stock 90% certificate.")
          print(report["rule"]["id"], report["overall"])
          PY
